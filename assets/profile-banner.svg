<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">h3cz GitHub profile banner</title>
  <desc id="desc">A dark cyber portfolio banner with terminal panels, circuit traces, soft violet and green lighting, and Hecz profile text.</desc>
  <defs>
    <radialGradient id="violetGlow" cx="22%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#b7a7ff" stop-opacity="0.45"/>
      <stop offset="48%" stop-color="#7c6ea8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mintGlow" cx="82%" cy="66%" r="68%">
      <stop offset="0%" stop-color="#64f4bd" stop-opacity="0.26"/>
      <stop offset="55%" stop-color="#64f4bd" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#05070d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#b7a7ff"/>
      <stop offset="52%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#64f4bd"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="520" fill="#05070d"/>
  <rect width="1400" height="520" fill="url(#grid)"/>
  <rect width="1400" height="520" fill="url(#violetGlow)"/>
  <rect width="1400" height="520" fill="url(#mintGlow)"/>

  <g opacity="0.72" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 405H246C270 405 282 393 282 369V310C282 289 293 278 314 278H456" stroke="#8b7da8" stroke-width="2"/>
    <path d="M1024 92H900C876 92 864 104 864 128V176C864 198 853 209 831 209H746" stroke="#64f4bd" stroke-width="2"/>
    <path d="M1126 420H987C964 420 953 409 953 386V335C953 313 942 302 920 302H800" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="72" cy="405" r="5" fill="#8b7da8" stroke="none"/>
    <circle cx="456" cy="278" r="5" fill="#8b7da8" stroke="none"/>
    <circle cx="1024" cy="92" r="5" fill="#64f4bd" stroke="none"/>
    <circle cx="746" cy="209" r="5" fill="#64f4bd" stroke="none"/>
    <circle cx="1126" cy="420" r="5" fill="#7dd3fc" stroke="none"/>
    <circle cx="800" cy="302" r="5" fill="#7dd3fc" stroke="none"/>
  </g>

  <g opacity="0.62">
    <circle cx="118" cy="90" r="1.5" fill="#ffffff"/>
    <circle cx="232" cy="154" r="1" fill="#ffffff"/>
    <circle cx="404" cy="92" r="1.3" fill="#ffffff"/>
    <circle cx="596" cy="62" r="1.1" fill="#ffffff"/>
    <circle cx="712" cy="142" r="1.5" fill="#ffffff"/>
    <circle cx="1036" cy="168" r="1.2" fill="#ffffff"/>
    <circle cx="1200" cy="114" r="1.1" fill="#ffffff"/>
    <circle cx="1292" cy="292" r="1.3" fill="#ffffff"/>
    <circle cx="1136" cy="368" r="1" fill="#ffffff"/>
    <circle cx="612" cy="410" r="1.2" fill="#ffffff"/>
  </g>

  <g transform="translate(82 72)">
    <rect x="0" y="0" width="1236" height="376" rx="24" fill="#080b12" fill-opacity="0.78" stroke="#2c3344"/>
    <rect x="32" y="34" width="270" height="34" rx="17" fill="#111827" stroke="#293244"/>
    <circle cx="55" cy="51" r="5" fill="#ff5f57"/>
    <circle cx="75" cy="51" r="5" fill="#febc2e"/>
    <circle cx="95" cy="51" r="5" fill="#28c840"/>
    <text x="122" y="56" fill="#c8d0e0" font-family="ui-monospace, Consolas, monospace" font-size="14">h3cz / README.md</text>

    <text x="32" y="126" fill="#8c95a8" font-family="ui-monospace, Consolas, monospace" font-size="16" letter-spacing="3">CYBERSECURITY STUDENT + BUILDER</text>
    <text x="32" y="197" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">Hecz</text>
    <text x="32" y="252" fill="#d8d2ef" font-family="Georgia, serif" font-size="34" font-style="italic">practical tools, secure systems, and honest craft</text>
    <rect x="32" y="286" width="275" height="5" rx="3" fill="url(#accent)"/>
    <text x="32" y="335" fill="#cbd5e1" font-family="ui-monospace, Consolas, monospace" font-size="17">Per Scholas cyber track  |  AI apps  |  labs  |  client systems</text>

    <g transform="translate(790 86)">
      <rect x="0" y="0" width="358" height="232" rx="18" fill="url(#screen)" stroke="#2b3448"/>
      <text x="24" y="42" fill="#7dd3fc" font-family="ui-monospace, Consolas, monospace" font-size="14">~/focus</text>
      <text x="24" y="82" fill="#f8fafc" font-family="ui-monospace, Consolas, monospace" font-size="18">$ whoami</text>
      <text x="24" y="116" fill="#cbd5e1" font-family="ui-monospace, Consolas, monospace" font-size="16">student.operator.builder</text>
      <text x="24" y="158" fill="#f8fafc" font-family="ui-monospace, Consolas, monospace" font-size="18">$ ship</text>
      <text x="24" y="192" fill="#cbd5e1" font-family="ui-monospace, Consolas, monospace" font-size="16">pulse  tag  labs  dashboards</text>
      <rect x="24" y="209" width="310" height="2" fill="#1f2937"/>
      <rect x="24" y="209" width="172" height="2" fill="url(#accent)"/>
