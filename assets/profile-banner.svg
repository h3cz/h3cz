<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480" role="img" aria-labelledby="title desc">
  <title id="title">Hecz — editorial profile banner</title>
  <desc id="desc">A warm cream editorial banner with a magazine headline, a dusty mauve rule, and a short focus line. The aesthetic of hecz.dev.</desc>
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- cream base -->
  <rect width="1400" height="480" fill="#FAF8F5"/>
  <rect width="1400" height="480" filter="url(#grain)" opacity="0.5"/>
  <!-- warm frame -->
  <rect x="20" y="20" width="1360" height="440" rx="14" fill="none" stroke="#DAD4C8" stroke-width="1.5"/>

  <!-- eyebrow -->
  <text x="80" y="116" fill="#635E6A" font-family="'JetBrains Mono', ui-monospace, Consolas, monospace" font-size="17" letter-spacing="7">CHICAGO · BUILDER · CYBERSECURITY</text>

  <!-- name, geometric display -->
  <text x="76" y="248" fill="#1D1C25" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="148" font-weight="700" letter-spacing="-3">Hecz</text>

  <!-- mauve editorial rule -->
  <rect x="80" y="288" width="232" height="6" rx="3" fill="#8B7DA8"/>

  <!-- editorial serif tagline -->
  <text x="80" y="370" fill="#2A2833" font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" font-size="48" font-style="italic">I turn messy real-world workflows into systems people can use.</text>

  <!-- footer rail -->
  <text x="80" y="430" fill="#635E6A" font-family="'JetBrains Mono', ui-monospace, Consolas, monospace" font-size="16" letter-spacing="2">hecz.dev   ·   pulse   ·   tag   ·   cybersecurity-labs</text>

  <!-- scarce mauve mark, top-right -->
  <circle cx="1300" cy="104" r="10" fill="#8B7DA8"/>
  <circle cx="1264" cy="104" r="5" fill="#8B7DA8" opacity="0.45"/>
</svg>
