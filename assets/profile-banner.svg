<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">JR Lopez / h3cz profile banner</title>
  <desc id="desc">A dark portfolio banner with mauve glow, terminal-style labels, and cybersecurity product builder messaging.</desc>
  <defs>
    <radialGradient id="glow" cx="35%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#8B7DA8" stop-opacity="0.38"/>
      <stop offset="45%" stop-color="#8B7DA8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F0F1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#8B7DA8"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="#0F0F1A"/>
  <rect width="1200" height="420" fill="url(#glow)"/>
  <g opacity="0.55">
    <circle cx="78" cy="70" r="1.3" fill="#fff"/>
    <circle cx="162" cy="143" r="1" fill="#fff"/>
    <circle cx="276" cy="76" r="1.4" fill="#fff"/>
    <circle cx="397" cy="181" r="0.9" fill="#fff"/>
    <circle cx="520" cy="54" r="1.2" fill="#fff"/>
    <circle cx="760" cy="98" r="1" fill="#fff"/>
    <circle cx="892" cy="69" r="1.5" fill="#fff"/>
    <circle cx="1038" cy="155" r="1" fill="#fff"/>
    <circle cx="1122" cy="68" r="1.2" fill="#fff"/>
    <circle cx="1020" cy="320" r="1.3" fill="#fff"/>
    <circle cx="868" cy="344" r="1" fill="#fff"/>
    <circle cx="694" cy="303" r="1.2" fill="#fff"/>
  </g>
  <g transform="translate(70 62)">
    <text x="0" y="0" fill="#8a8a9a" font-family="ui-monospace, Consolas, monospace" font-size="16" letter-spacing="4">H3CZ.DEV / CYBERSECURITY PORTFOLIO</text>
    <text x="0" y="104" fill="#ffffff" font-family="Georgia, serif" font-size="76" font-style="italic" font-weight="700">JR Lopez</text>
    <text x="0" y="156" fill="#a68fcc" font-family="Georgia, serif" font-size="34" font-style="italic">building practical tools for AI, web apps, automation, and security</text>
    <rect x="0" y="190" width="210" height="5" fill="url(#line)" rx="3"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="15" fill="#d8d3e6">
      <text x="0" y="252">PER SCHOLAS CYBERSECURITY STUDENT</text>
      <text x="0" y="286">CLIENT OPS + SALES LEADERSHIP → SECURE SYSTEMS</text>
      <text x="0" y="320">PULSE · TAG · CYBERSECURITY LABS · HECZ HQ</text>
    </g>
  </g>
  <g transform="translate(810 95)">
    <rect x="0" y="0" width="300" height="210" rx="18" fill="#141421" stroke="#2a2a3a"/>
    <text x="24" y="42" fill="#8a8a9a" font-family="ui-monospace, Consolas, monospace" font-size="13" letter-spacing="2">CURRENT FOCUS</text>
    <text x="24" y="82" fill="#ffffff" font-family="ui-monospace, Consolas, monospace" font-size="18">01  security labs</text>
    <text x="24" y="116" fill="#ffffff" font-family="ui-monospace, Consolas, monospace" font-size="18">02  safer AI apps</text>
    <text x="24" y="150" fill="#ffffff" font-family="ui-monospace, Consolas, monospace" font-size="18">03  client systems</text>
    <path d="M24 178 H244" stroke="#2a2a3a"/>
    <path d="M24 178 H118" stroke="#8B7DA8" stroke-width="3"/>
  </g>
</svg>
